<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>GeoHazard — საქართველოს საფრთხეების რუკა</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  body{margin:0;font-family:sans-serif;background:#0c1018;color:white;display:flex;height:100vh;}
  #map{flex:1;}
  aside{width:350px;background:#161d2c;padding:20px;overflow-y:auto;border-left:1px solid #27314a;}
  .news-item{background:#1c2436;padding:10px;margin-top:10px;border-radius:8px;font-size:12px;}
  a{color:white;text-decoration:none;}
</style>
</head>
<body>
<div id="map"></div>
<aside id="detail">
  <h2>დეტალები</h2>
  <p>აირჩიეთ მუნიციპალიტეტი რუკაზე.</p>
</aside>

<script>
// 1. მუნიციპალიტეტების სია
const MUNI = [
  {n:"თბილისი",lat:41.72,lon:44.78}, {n:"ბათუმი",lat:41.64,lon:41.64}, 
  {n:"ქუთაისი",lat:42.27,lon:42.70}, {n:"რუსთავი",lat:41.56,lon:44.97},
  {n:"გორი",lat:41.98,lon:44.11}, {n:"თელავი",lat:41.91,lon:45.47},
  {n:"ზუგდიდი",lat:42.50,lon:41.87}, {n:"ახალციხე",lat:41.64,lon:42.98},
  {n:"მცხეთა",lat:41.84,lon:44.71}, {n:"ამბროლაური",lat:42.52,lon:43.16}
];

// 2. რეგიონების საზღვრები (GeoJSON)
const REGIONS = {"type":"FeatureCollection","features":[
  {"type":"Feature","properties":{"name_ka":"იმერეთი"},"geometry":{"type":"Polygon","coordinates":[[[43.75,42.39],[43.60,42.17],[43.54,42.09],[43.48,42.05],[43.43,41.95],[43.42,41.91],[43.12,41.82],[42.99,41.82],[42.94,41.81],[42.81,41.82],[42.71,41.80],[42.64,41.83],[42.63,41.92],[42.57,41.93],[42.41,41.99],[42.38,42.04],[42.34,42.05],[42.29,42.03],[42.23,42.04],[42.20,42.07],[42.22,42.09],[42.26,42.10],[42.28,42.13],[42.29,42.22],[42.37,42.32],[42.44,42.38],[42.46,42.44],[42.52,42.51],[42.61,42.52],[42.63,42.43],[42.73,42.46],[42.79,42.45],[42.83,42.46],[42.94,42.40],[42.95,42.37],[43.05,42.33],[43.16,42.35],[43.19,42.38],[43.29,42.42],[43.50,42.41],[43.66,42.37],[43.75,42.39]]]}},
  {"type":"Feature","properties":{"name_ka":"აფხაზეთი"},"geometry":{"type":"Polygon","coordinates":[[[40.16,43.57],[40.51,43.50],[41.01,43.37],[41.57,43.21],[42.12,43.16],[41.90,42.98],[41.80,42.52],[41.50,42.64],[40.95,42.97],[40.39,43.16],[40.16,43.57]]]}}
]};

// 3. რუკის აგება
let map = L.map('map').setView([42.0, 43.5], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

L.geoJSON(REGIONS, {
    style: {fillColor: '#3da9fc', fillOpacity: 0.5, weight: 1, color: '#fff'},
    onEachFeature: (f, layer) => {
      layer.on('click', () => selectMuni(f.properties.name_ka));
    }
}).addTo(map);

// 4. ნიუსების ფუნქცია
async function selectMuni(name) {
  const rss = `https://news.google.com/rss/search?q=${encodeURIComponent(name + " სტიქია")}&hl=ka&gl=GE`;
  const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`);
  const d = await res.json();
  
  document.getElementById('detail').innerHTML = `<h2>${name}</h2>` + 
    (d.items && d.items.length > 0 ? d.items.slice(0,3).map(n => 
      `<div class="news-item"><a href="${n.link}" target="_blank">${n.title}</a></div>`).join('') 
    : "<p>ამ მუნიციპალიტეტზე სტიქიის შესახებ ინფორმაცია არ იძებნება.</p>");
}
</script>
</body>
</html>
