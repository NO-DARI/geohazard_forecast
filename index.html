let map, geoLayer;

function init(){
  map = L.map('map').setView([42.0, 43.5], 7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
  
  geoLayer = L.geoJSON(REGIONS, {
    style: {fillColor: '#3da9fc', fillOpacity: 0.5, weight: 1, color: '#fff'},
    onEachFeature: (f, layer) => {
      layer.on('click', () => selectMuni(f.properties.name_ka));
    }
  }).addTo(map);
  map.fitBounds(geoLayer.getBounds());
}

async function selectMuni(name) {
  const news = await fetchNews(name);
  document.getElementById('detail').innerHTML = `<h2>${name}</h2>` + 
    news.map(n => `<div class="news-item"><a href="${n.link}" target="_blank" style="color:white;">${n.title}</a></div>`).join('');
}

async function fetchNews(muniName) {
  try {
    const rss = `https://news.google.com/rss/search?q=${encodeURIComponent(muniName + " სტიქია")}&hl=ka&gl=GE`;
    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`);
    const d = await res.json();
    return d.items ? d.items.slice(0, 3) : [];
  } catch(e) { return []; }
}

init();
